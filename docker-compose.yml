services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signing_documents}
      POSTGRES_USER: ${POSTGRES_USER:-signing_documents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signing_documents}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signing_documents} -d ${POSTGRES_DB:-signing_documents}"]
      interval: 5s
      timeout: 3s
      retries: 20

  signing-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signing-documents-backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-dev}
      POSTGRES_DB: ${POSTGRES_DB:-signing_documents}
      POSTGRES_USER: ${POSTGRES_USER:-signing_documents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signing_documents}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SIGNATURE_IMAGE_PATH: ${DOCKER_SIGNATURE_IMAGE_PATH:-/app/assets/подпись.png}
      STAMP_IMAGE_PATH: ${DOCKER_STAMP_IMAGE_PATH:-/app/assets/Печать.png}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-rus+eng}
      WORKDIR: /app/.runtime
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - signing_runtime:/app/.runtime
      - /Users/rafailvv/Documents:/app/assets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  signing_runtime:
  pg_data:

networks:
  default:
    ipam:
      config:
        - subnet: 10.89.0.0/24
